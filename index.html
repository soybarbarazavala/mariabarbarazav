<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOCHE NOIR - Historia</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: black;
            color: white;
            font-family: serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .historia {
            width: 1080px;
            height: 1920px;
            border: 3px solid white;
            padding: 100px 60px;
            box-sizing: border-box;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h1 {
            font-size: 110px;
            letter-spacing: 6px;
            margin: 30px 0 20px;
            line-height: 1;
        }

        p {
            font-size: 42px;
            margin: 25px 0;
            line-height: 1.3;
        }

        a {
            color: white;
            text-decoration: underline;
            font-size: 38px;
            margin-top: 40px;
        }

        /* Estilos para cuando se imprime a PDF */
        @media print {
            body {
                background: black;
            }
            .historia {
                width: 1080px !important;
                height: 1920px !important;
                margin: 0 auto;
                box-shadow: none;
            }
            @page {
                size: 1080px 1920px;
                margin: 0;
            }
        }
    </style>
</head>
<body>
    <div class="historia">
        <h1>NOCHE NOIR</h1>
        <p>Evento exclusivo</p>
        <p>12 de abril</p>
        <p>21:00 hrs</p>
        <p>¡Solo para invitados!</p>
        
        <!-- Agrega aquí tu link -->
        <p><a href="https://tu-link-de-boletos-o-info.com">Más info y boletos →</a></p>
    </div>
</body>
</html>
